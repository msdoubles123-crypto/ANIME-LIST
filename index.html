<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shakil's Anime Vault</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e2e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding-bottom: 60px;
  }
  .header {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 50%, #0a0f1a 100%);
    border-bottom: 1px solid rgba(139,92,246,0.3);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header-bg {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 20% 50%, rgba(139,92,246,0.08) 0%, transparent 60%),
                      radial-gradient(circle at 80% 50%, rgba(6,182,212,0.06) 0%, transparent 60%);
  }
  .header-inner { position: relative; }
  .header-sub { font-size: 11px; letter-spacing: 6px; color: #8b5cf6; text-transform: uppercase; margin-bottom: 8px; }
  .header h1 {
    font-size: clamp(24px, 7vw, 40px); font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header p { margin-top: 8px; color: #6b7280; font-size: 14px; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px 0; }
  #searchInput {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: #e2e0f0;
    font-size: 14px; outline: none;
    margin-bottom: 24px;
  }
  #searchInput::placeholder { color: #4b5563; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03); color: #9ca3af;
    transition: all 0.2s; font-family: inherit;
  }
  .pill.active-all { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #e2e0f0; font-weight: 700; }
  .genre-section { margin-bottom: 32px; }
  .genre-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
  }
  .genre-title { font-size: 16px; font-weight: 700; }
  .genre-count {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
  }
  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px;
  }
  @media (max-width: 600px) {
    .anime-grid { grid-template-columns: 1fr; }
  }
  .anime-card {
    border-radius: 10px; padding: 10px 14px;
    display: flex; flex-direction: column; gap: 6px;
    transition: transform 0.15s;
  }
  .anime-card:active { transform: scale(0.98); }
  .anime-row { display: flex; align-items: center; gap: 8px; }
  .anime-num { font-size: 11px; opacity: 0.7; min-width: 24px; }
  .anime-title { font-weight: 600; font-size: 13px; line-height: 1.3; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 32px; }
  .tag {
    font-size: 10px; padding: 1px 7px; border-radius: 20px;
    background: rgba(0,0,0,0.3); color: #9ca3af;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .search-results { margin-bottom: 32px; }
  .search-meta { font-size: 12px; color: #6b7280; margin-bottom: 10px; }
  .search-card {
    background: rgba(255,255,255,0.04); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 12; flex-wrap: wrap;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .search-card-num { color: #4b5563; font-size: 12px; min-width: 22px; }
  .search-card-title { font-weight: 600; font-size: 14px; flex: 1; }
  .search-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .search-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    background: rgba(139,92,246,0.15); color: #a78bfa;
    border: 1px solid rgba(139,92,246,0.3);
  }
  .hidden { display: none; }
</style>
</head>
<body>

  { id: 78, title: "Cowboy Bebop", genres: ["Sci-Fi", "Action", "Neo-Noir"] },
  { id: 81, title: "Domestic Girlfriend", genres: ["Romance", "Drama", "Ecchi"] },
  { id: 87, title: "FLCL", genres: ["Surreal", "Sci-Fi", "Coming-of-Age"] },
  { id: 65, title: "Lookism", genres: ["Action", "Drama", "School"] },

const GENRE_GROUPS = [
  { label: "🧠 Psychological & Thriller", key: "Psychological", color: "#8b5cf6", bg: "rgba(139,92,246,0.08)", border: "rgba(139,92,246,0.35)",
    match: g => g.includes("Psychological") || (g.includes("Thriller") && !g.includes("Action")) },
  { label: "💀 Horror & Dark", key: "Horror", color: "#ef4444", bg: "rgba(239,68,68,0.08)", border: "rgba(239,68,68,0.35)",
    match: g => g.includes("Horror") || g.includes("Dark") || g.includes("Gore") },
  { label: "⚔️ Action & Battle Shonen", key: "Action", color: "#f97316", bg: "rgba(249,115,22,0.08)", border: "rgba(249,115,22,0.35)",
    match: g => g.includes("Action") && !g.includes("Sci-Fi") && !g.includes("Sports") && !g.includes("Crime") && !g.includes("Comedy") },
  { label: "🚀 Sci-Fi & Cyberpunk", key: "Sci-Fi", color: "#06b6d4", bg: "rgba(6,182,212,0.08)", border: "rgba(6,182,212,0.35)",
    match: g => (g.includes("Sci-Fi") || g.includes("Mecha") || g.includes("Cyberpunk")) && !g.includes("Action") },
  { label: "💕 Romance & Slice of Life", key: "Romance", color: "#ec4899", bg: "rgba(236,72,153,0.08)", border: "rgba(236,72,153,0.35)",
    match: g => g.includes("Romance") || g.includes("Slice of Life") },
  { label: "🏆 Sports", key: "Sports", color: "#22c55e", bg: "rgba(34,197,94,0.08)", border: "rgba(34,197,94,0.35)",
    match: g => g.includes("Sports") || g.includes("Racing") },
  { label: "🔍 Crime & Mystery", key: "Mystery", color: "#eab308", bg: "rgba(234,179,8,0.08)", border: "rgba(234,179,8,0.35)",
    match: g => (g.includes("Crime") || g.includes("Mystery")) && !g.includes("Horror") },
  { label: "👻 Supernatural & Fantasy", key: "Supernatural", color: "#a78bfa", bg: "rgba(167,139,250,0.08)", border: "rgba(167,139,250,0.35)",
    match: g => g.includes("Supernatural") || g.includes("Fantasy") },
  { label: "🌍 Post-Apocalyptic & Dark Fantasy", key: "Post-Apocalyptic", color: "#78716c", bg: "rgba(120,113,108,0.08)", border: "rgba(120,113,108,0.35)",
    match: g => g.includes("Post-Apocalyptic") || g.includes("Steampunk") },
  { label: "😂 Comedy & Ecchi", key: "Comedy", color: "#facc15", bg: "rgba(250,204,21,0.08)", border: "rgba(250,204,21,0.35)",
    match: g => (g.includes("Comedy") || g.includes("Ecchi")) && !g.includes("Action") && !g.includes("Romance") && !g.includes("Sports") },
  { label: "🎨 Classics & Artsy", key: "Artsy", color: "#f472b6", bg: "rgba(244,114,182,0.08)", border: "rgba(244,114,182,0.35)",
    match: g => g.includes("Neo-Noir") || g.includes("Surreal") || g.includes("Artsy") || g.includes("Literary") || g.includes("Coming-of-Age") },
  { label: "📱 Manhwa / Webtoon", key: "Manhwa", color: "#34d399", bg: "rgba(52,211,153,0.08)", border: "rgba(52,211,153,0.35)",
    match: g => g.includes("School") && g.includes("Drama") },
];

function assignGroup(anime) {
  for (const group of GENRE_GROUPS) {
    if (group.match(anime.genres)) return group.key;
  }
  return "Action";
}

const grouped = {};
GENRE_GROUPS.forEach(g => grouped[g.key] = []);
animeData.forEach(a => grouped[assignGroup(a)].push(a));

let activeGroup = null;

function buildPills() {
  const container = document.getElementById('pillsContainer');
  let html = `<button class="pill active-all" onclick="filterGroup(null, this)">All</button>`;
  GENRE_GROUPS.forEach(g => {
    const count = grouped[g.key]?.length || 0;
    html += `<button class="pill" onclick="filterGroup('${g.key}', this)" 
      style="color:${g.color}" data-key="${g.key}">${g.label} <span style="opacity:0.7">(${count})</span></button>`;
  });
  container.innerHTML = html;
}

function filterGroup(key, btn) {
  activeGroup = key;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active-all');
    p.style.background = 'rgba(255,255,255,0.03)';
    p.style.borderColor = 'rgba(255,255,255,0.08)';
    p.style.fontWeight = '400';
  });
  if (key === null) {
    btn.classList.add('active-all');
  } else {
    const group = GENRE_GROUPS.find(g => g.key === key);
    btn.style.background = group.bg;
    btn.style.borderColor = group.border;
    btn.style.fontWeight = '700';
  }
  buildGenres();
}

function buildGenres() {
  const container = document.getElementById('genreContainer');
  let html = '';
  GENRE_GROUPS.filter(g => !activeGroup || activeGroup === g.key).forEach(group => {
    const list = grouped[group.key] || [];
    if (!list.length) return;
    html += `<div class="genre-section">
      <div class="genre-header" style="border-bottom:1px solid ${group.border}">
        <h2 class="genre-title" style="color:${group.color}">${group.label}</h2>
        <span class="genre-count" style="background:${group.bg};color:${group.color};border:1px solid ${group.border}">${list.length} anime</span>
      </div>
      <div class="anime-grid">`;
    list.forEach(anime => {
      html += `<div class="anime-card" style="background:${group.bg};border:1px solid ${group.border}">
        <div class="anime-row">
          <span class="anime-num" style="color:${group.color}">#${anime.id}</span>
          <span class="anime-title">${anime.title}</span>
        </div>
        <div class="tag-row">${anime.genres.map(g => `<span class="tag">${g}</span>`).join('')}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function handleSearch(val) {
  const searchEl = document.getElementById('searchResults');
  const pillsEl = document.getElementById('pillsContainer');
  const genreEl = document.getElementById('genreContainer');
  if (!val.trim()) {
    searchEl.classList.add('hidden');
    pillsEl.classList.remove('hidden');
    genreEl.classList.remove('hidden');
    return;
  }
  pillsEl.classList.add('hidden');
  genreEl.classList.add('hidden');
  searchEl.classList.remove('hidden');
  const results = animeData.filter(a => a.title.toLowerCase().includes(val.toLowerCase()));
  let html = `<div class="search-meta">${results.length} result${results.length !== 1 ? 's' : ''} for "${val}"</div>`;
  results.forEach(a => {
    html += `<div class="search-card">
      <span class="search-card-num">#${a.id}</span>
      <span class="search-card-title">${a.title}</span>
      <div class="search-tags">${a.genres.map(g => `<span class="search-tag">${g}</span>`).join('')}</div>
    </div>`;
  });
  searchEl.innerHTML = html;
}

buildPills();
buildGenres();
</script>
</body>
</html>
