<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRUTAL ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blood: #e01010;
    --gold: #f5a623;
    --dark: #0a0a0f;
    --mid: #12121e;
    --panel: #1a1a2e;
    --cyan: #00ffe0;
    --purple: #7b2fff;
    --white: #f0f0f0;
    --hp-green: #00e676;
    --hp-yellow: #ffea00;
    --hp-red: #ff1744;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; }
  .screen.active { display:flex; }

  /* ── START SCREEN ── */
  #startScreen {
    background: radial-gradient(ellipse at 60% 40%, #1a0030 0%, #0a0a0f 70%);
  }
  .title-block { text-align:center; margin-bottom:40px; }
  .title-main {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(60px,10vw,120px);
    letter-spacing: 8px;
    color: var(--white);
    text-shadow: 0 0 40px var(--blood), 0 0 80px rgba(224,16,16,0.4);
    animation: flicker 4s infinite;
  }
  .title-sub {
    font-size:18px; letter-spacing:12px; color:var(--gold);
    text-transform:uppercase; margin-top:-8px;
  }
  @keyframes flicker {
    0%,95%,100%{ opacity:1; }
    96%{ opacity:0.7; }
    97%{ opacity:1; }
    98%{ opacity:0.5; }
  }

  /* ── STYLE SELECT ── */
  .style-grid {
    display:grid; grid-template-columns: repeat(3,1fr);
    gap:16px; margin:24px 0; width:min(700px,95vw);
  }
  .style-card {
    background: var(--panel);
    border: 2px solid #333;
    border-radius: 8px;
    padding: 18px 12px;
    cursor: pointer;
    transition: all .2s;
    text-align:center;
    position:relative; overflow:hidden;
  }
  .style-card:hover, .style-card.selected {
    border-color: var(--gold);
    background: rgba(245,166,35,0.08);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(245,166,35,0.25);
  }
  .style-card .icon { font-size:36px; display:block; margin-bottom:8px; }
  .style-card .sname { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--gold); }
  .style-card .sdesc { font-size:12px; color:#888; margin-top:4px; line-height:1.4; }
  .style-card .stats { display:flex; gap:6px; margin-top:8px; justify-content:center; flex-wrap:wrap; }
  .stat-pill { font-size:10px; padding:2px 7px; border-radius:20px; background:#222; color:#aaa; }
  .stat-pill.high { background:rgba(0,230,118,0.15); color:var(--hp-green); }
  .stat-pill.med { background:rgba(255,234,0,0.15); color:var(--hp-yellow); }
  .stat-pill.low { background:rgba(255,23,68,0.15); color:var(--hp-red); }

  .btn {
    padding:14px 40px; border:none; border-radius:4px; cursor:pointer;
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--blood);
    color: white;
    box-shadow: 0 4px 20px rgba(224,16,16,0.5);
  }
  .btn-primary:hover { background:#ff2222; transform:scale(1.05); }
  .btn-secondary { background:transparent; color:var(--gold); border:2px solid var(--gold); }
  .btn-secondary:hover { background:rgba(245,166,35,0.1); }
  .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* ── GAME SCREEN ── */
  #gameScreen { background: var(--dark); padding:0; }

  /* HUD */
  .hud {
    width:100%; display:flex; align-items:center;
    padding:12px 20px; gap:12px;
    background:linear-gradient(180deg,rgba(0,0,0,0.9),transparent);
    position:relative; z-index:10;
  }
  .fighter-hud { flex:1; }
  .fighter-hud.enemy { text-align:right; }
  .fighter-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
  .hp-bar-wrap { height:14px; background:#111; border-radius:2px; overflow:hidden; margin-top:4px; border:1px solid #333; }
  .hp-bar { height:100%; transition: width .3s, background .3s; border-radius:2px; }
  .hp-label { font-size:11px; color:#777; margin-top:2px; }
  .round-info { text-align:center; min-width:100px; }
  .round-num { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:3px; color:#555; }
  .timer-display { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; color:var(--white); }
  .combo-display { font-family:'Bebas Neue',sans-serif; font-size:13px; color:var(--gold); }

  /* ARENA */
  .arena-wrap { flex:1; position:relative; overflow:hidden; }
  #arenaCanvas { display:block; width:100%; height:100%; }

  /* CONTROL PANEL */
  .control-panel {
    width:100%; padding:10px 16px;
    background:linear-gradient(0deg,rgba(0,0,0,0.95),transparent);
    display:flex; gap:12px; align-items:flex-start; justify-content:space-between;
  }
  .move-group { display:flex; flex-direction:column; gap:6px; }
  .move-group-label { font-size:11px; letter-spacing:2px; color:#555; text-transform:uppercase; }
  .move-row { display:flex; gap:6px; flex-wrap:wrap; }
  .move-btn {
    padding:8px 14px; border:none; border-radius:4px; cursor:pointer;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px;
    transition: all .1s; letter-spacing:1px; position:relative; overflow:hidden;
  }
  .move-btn:active { transform:scale(0.94); }
  .move-btn.attack { background:#c0392b; color:#fff; }
  .move-btn.special { background:linear-gradient(135deg,#7b2fff,#00ffe0); color:#fff; }
  .move-btn.defense { background:#1e3a5f; color:#7bb3ff; border:1px solid #2a5298; }
  .move-btn.mobility { background:#1a3320; color:#4caf50; border:1px solid #2e7d32; }
  .move-btn:disabled { opacity:.35; cursor:not-allowed; }
  .move-btn .cd-overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-family:'Bebas Neue',sans-serif; color:white;
    pointer-events:none;
  }
  .energy-bar-wrap { display:flex; align-items:center; gap:8px; }
  .energy-label { font-size:11px; color:#555; letter-spacing:2px; }
  .energy-pips { display:flex; gap:4px; }
  .energy-pip {
    width:16px; height:16px; border-radius:3px;
    border:1px solid #333; background:#111;
    transition: background .2s, box-shadow .2s;
  }
  .energy-pip.filled { background:var(--cyan); box-shadow:0 0 8px var(--cyan); }

  /* FLOATING TEXTS */
  .float-text {
    position:absolute; font-family:'Bebas Neue',sans-serif;
    pointer-events:none; z-index:50; animation: floatUp .9s ease-out forwards;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  }
  @keyframes floatUp {
    0%{ transform:translateY(0) scale(1); opacity:1; }
    100%{ transform:translateY(-70px) scale(1.3); opacity:0; }
  }

  /* OVERLAY messages */
  .arena-message {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:40; pointer-events:none;
  }
  .arena-message-text {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,8vw,80px);
    letter-spacing:6px; color:white;
    text-shadow:0 0 30px var(--blood), 0 0 60px rgba(224,16,16,0.5);
    animation: msgPop .5s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes msgPop {
    0%{ transform:scale(0.5); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }

  /* ── RESULT SCREEN ── */
  #resultScreen {
    background: radial-gradient(ellipse at center, #1a0010 0%, #0a0a0f 70%);
  }
  .result-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(50px,10vw,100px); letter-spacing:6px; }
  .result-title.win { color:var(--gold); text-shadow:0 0 40px rgba(245,166,35,0.5); }
  .result-title.lose { color:var(--blood); text-shadow:0 0 40px rgba(224,16,16,0.5); }
  .result-stats { margin:20px 0; color:#888; font-size:16px; letter-spacing:1px; text-align:center; }
  .result-stats span { color:var(--white); }

  .screen-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(22px,4vw,36px); letter-spacing:4px; color:var(--gold); margin-bottom:8px; }

  /* KEYBOARD HINT */
  .kb-hint { font-size:11px; color:#444; text-align:center; margin-top:6px; letter-spacing:1px; }
</style>
</head>
<body>

<!-- ───────────── START / SELECT SCREEN ───────────── -->
<div class="screen active" id="startScreen">
  <div class="title-block">
    <div class="title-main">BRUTAL ARENA</div>
    <div class="title-sub">Choose Your Fighting Style</div>
  </div>
  <p class="screen-title">SELECT STYLE</p>
  <div class="style-grid" id="styleGrid"></div>
  <button class="btn btn-primary" id="startBtn" disabled onclick="startGame()">ENTER THE ARENA</button>
  <p style="margin-top:12px;font-size:12px;color:#444;letter-spacing:2px;">KEYBOARD: A/S/D/F — SPACE — Q/W</p>
</div>

<!-- ───────────── GAME SCREEN ───────────── -->
<div class="screen" id="gameScreen">
  <div class="hud">
    <div class="fighter-hud">
      <div class="fighter-name" id="playerName">PLAYER</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="playerHpBar" style="width:100%;background:var(--hp-green)"></div></div>
      <div class="hp-label"><span id="playerHpVal">100</span> / 100 HP</div>
    </div>
    <div class="round-info">
      <div class="round-num" id="roundLabel">ROUND 1</div>
      <div class="timer-display" id="timerDisplay">60</div>
      <div class="combo-display" id="comboDisplay">—</div>
    </div>
    <div class="fighter-hud enemy">
      <div class="fighter-name" id="enemyName">ENEMY</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="enemyHpBar" style="width:100%;background:var(--hp-green)"></div></div>
      <div class="hp-label"><span id="enemyHpVal">100</span> / 100 HP</div>
    </div>
  </div>

  <div class="arena-wrap">
    <canvas id="arenaCanvas"></canvas>
    <div class="arena-message" id="arenaMessage" style="display:none">
      <div class="arena-message-text" id="arenaMessageText"></div>
    </div>
  </div>

  <div class="control-panel">
    <div>
      <div class="move-group-label">ATTACKS</div>
      <div class="move-row" id="attackRow"></div>
      <div class="move-group-label" style="margin-top:8px">SPECIAL</div>
      <div class="move-row" id="specialRow"></div>
    </div>
    <div>
      <div class="move-group-label">DEFENSE</div>
      <div class="move-row" id="defenseRow"></div>
      <div class="move-group-label" style="margin-top:8px">MOBILITY</div>
      <div class="move-row" id="mobilityRow"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
      <div class="energy-bar-wrap">
        <div class="energy-label">ENERGY</div>
        <div class="energy-pips" id="energyPips"></div>
      </div>
      <div style="font-size:11px;color:#444;text-align:right">
        KEYBOARD: A=Light S=Heavy D=Special<br>F=Block Q=Dodge W=Counter
      </div>
    </div>
  </div>
  <div class="kb-hint" id="statusMsg">FIGHT!</div>
</div>

<!-- ───────────── RESULT SCREEN ───────────── -->
<div class="screen" id="resultScreen">
  <div class="result-title" id="resultTitle">VICTORY</div>
  <div class="result-stats" id="resultStats"></div>
  <div style="display:flex;gap:16px;margin-top:24px">
    <button class="btn btn-primary" onclick="showStart()">FIGHT AGAIN</button>
  </div>
</div>

<script>

// ═══════════════════════════════════════════════════

    moves:[
      {id:'spark',     label:'SPARK',      cat:'attack',  key:'A', dmg:[7,11],   cost:0,  cd:0.6, desc:'Zap foe + gain 1 energy',kb:1},

      {id:'shield',    label:'BARRIER',    cat:'defense', key:'F', dmg:[0,0],    cost:2,  cd:4,   desc:'Block all damage for 2s', kb:0},
      {id:'blink',     label:'BLINK',      cat:'mobility',key:'Q', dmg:[0,0],    cost:1,  cd:2,   desc:'Teleport away',          kb:0},

    moves:[
      {id:'grab',      label:'GRAB',       cat:'attack',  key:'A', dmg:[10,16],  cost:0,  cd:0.8, desc:'Grapple hold',           kb:4},

      {id:'groundslam',label:'SLAM',       cat:'special', key:'D', dmg:[38,48],  cost:3,  cd:6,   desc:'Ground pound — huge knockback',kb:20},
      {id:'ironwall',  label:'IRON WALL',  cat:'defense', key:'F', dmg:[0,0],    cost:0,  cd:2,   desc:'Massive defense stance',  kb:0},
      {id:'pounce',    label:'POUNCE',     cat:'mobility',key:'Q', dmg:[8,14],   cost:1,  cd:2,   desc:'Leap + body slam',        kb:6},
      {id:'absorb',    label:'ABSORB',     cat:'defense', key:'W', dmg:[0,0],    cost:0,  cd:5,   desc:'Convert damage to energy',kb:0},
    ]
  },
  {
    id:'samurai', name:'SAMURAI', icon:'⚔️',
    desc:'Precision and timing. One perfect strike ends a fight.',
    color:'#ff6b35',
    stats:{speed:'med',damage:'high',defense:'med',energy:'med'},
    moves:[
      {id:'iaijutsu',  label:'DRAW CUT',   cat:'attack',  key:'A', dmg:[11,16],  cost:0,  cd:0.7, desc:'Lightning-fast draw',    kb:3},
      {id:'cleave',    label:'CLEAVE',     cat:'attack',  key:'S', dmg:[20,28],  cost:1,  cd:2,   desc:'Wide slash arc',         kb:8},
      {id:'musou',     label:'MUSOU',      cat:'special', key:'D', dmg:[45,60],  cost:4,  cd:8,   desc:'Ultimate sword technique',kb:18},
      {id:'deflect',   label:'DEFLECT',    cat:'defense', key:'F', dmg:[0,0],    cost:1,  cd:2,   desc:'Deflect and stun enemy', kb:0},
      {id:'sidestep',  label:'SIDESTEP',   cat:'mobility',key:'Q', dmg:[0,0],    cost:0,  cd:1,   desc:'Quick evade',            kb:0},
      {id:'iai',       label:'PERFECT CUT',cat:'defense', key:'W', dmg:[25,35],  cost:3,  cd:5,   desc:'Counter with lethal strike',kb:12},
    ]
  },
  {
    id:'gunner', name:'GUNNER', icon:'🔫',
    desc:'Keep distance. Outrange enemies with bullet-based combos.',
    color:'#26a69a',
    stats:{speed:'high',damage:'med',defense:'low',energy:'med'},
    moves:[
      {id:'shot',      label:'SHOT',       cat:'attack',  key:'A', dmg:[9,13],   cost:0,  cd:0.5, desc:'Quick pistol shot',      kb:2},
      {id:'burst',     label:'BURST',      cat:'attack',  key:'S', dmg:[20,26],  cost:1,  cd:2,   desc:'3-round burst fire',     kb:4},
      {id:'airburst',  label:'AIR BURST',  cat:'special', key:'D', dmg:[30,42],  cost:3,  cd:6,   desc:'Explosive round — huge splash',kb:12},
      {id:'roll',      label:'ROLL',       cat:'mobility',key:'Q', dmg:[0,0],    cost:0,  cd:1,   desc:'Combat roll away',       kb:0},
      {id:'suppfire',  label:'SUPPRESS',   cat:'defense', key:'F', dmg:[6,9],    cost:1,  cd:3,   desc:'Cover fire — slow enemy 50%',kb:1},
      {id:'rapidfire', label:'RAPID FIRE', cat:'special', key:'W', dmg:[22,32],  cost:2,  cd:5,   desc:'Spam 5 shots',           kb:3},
    ]

];

const ENEMIES = [
  { name:'TITAN',    color:'#e53935', hp:100, speed:0.3, aggressiveness:0.7, style:'brawler' },
  { name:'PHANTOM',  color:'#7e57c2', hp:100, speed:0.6, aggressiveness:0.5, style:'ninja'   },
  { name:'WARLORD',  color:'#f57c00', hp:120, speed:0.4, aggressiveness:0.8, style:'wrestler'},
  { name:'SPECTER',  color:'#26c6da', hp:85,  speed:0.7, aggressiveness:0.4, style:'gunner'  },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let selectedStyle = null;
let game = null;

// ═══════════════════════════════════════════════════
// STYLE SELECT
// ═══════════════════════════════════════════════════
function buildStyleGrid() {
  const grid = document.getElementById('styleGrid');
  grid.innerHTML = '';
  STYLES.forEach(s => {
    const card = document.createElement('div');
    card.className = 'style-card';
    card.innerHTML = `
      <span class="icon">${s.icon}</span>
      <div class="sname">${s.name}</div>
      <div class="sdesc">${s.desc}</div>
      <div class="stats">
        <span class="stat-pill ${s.stats.speed==='high'?'high':s.stats.speed==='med'?'med':'low'}">SPD:${s.stats.speed.toUpperCase()}</span>
        <span class="stat-pill ${s.stats.damage==='high'?'high':s.stats.damage==='med'?'med':'low'}">DMG:${s.stats.damage.toUpperCase()}</span>
        <span class="stat-pill ${s.stats.defense==='high'?'high':s.stats.defense==='med'?'med':'low'}">DEF:${s.stats.defense.toUpperCase()}</span>
      </div>`;
    card.onclick = () => {
      document.querySelectorAll('.style-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectedStyle = s;
      document.getElementById('startBtn').disabled = false;
    };
    grid.appendChild(card);
  });
}
buildStyleGrid();

function showStart() {
  if(game){ game.destroy(); game=null; }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('startScreen').classList.add('active');
  document.querySelectorAll('.style-card').forEach(c=>c.classList.remove('selected'));
  selectedStyle=null;
  document.getElementById('startBtn').disabled=true;
}

// ═══════════════════════════════════════════════════
// GAME CLASS
// ═══════════════════════════════════════════════════
function startGame() {
  if(!selectedStyle) return;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('gameScreen').classList.add('active');
  const enemy = ENEMIES[Math.floor(Math.random()*ENEMIES.length)];
  game = new FightGame(selectedStyle, enemy);
  game.init();
}

class FightGame {
  constructor(style, enemyDef) {
    this.style     = style;
    this.enemyDef  = enemyDef;
    this.playerHp  = 100;
    this.enemyHp   = enemyDef.hp;
    this.enemyMaxHp= enemyDef.hp;
    this.energy    = 0;
    this.maxEnergy = 5;
    this.combo     = 0;
    this.comboTimer= null;
    this.blocked   = false;
    this.shielded  = false;
    this.counterReady = false;
    this.enemyStunned = false;
    this.enemyBlinded = false;
    this.roundTime = 60;
    this.timerInterval = null;
    this.cooldowns = {};
    this.active    = true;
    this.round     = 1;
    this.enemyDelay= null;
    // canvas
    this.canvas = document.getElementById('arenaCanvas');
    this.ctx    = this.canvas.getContext('2d');
    // fighter positions
    this.playerX = 0.25;
    this.enemyX  = 0.75;
    this.playerAnim = null;
    this.enemyAnim  = null;
    this.shake = 0;
    this.effects = [];
  }

  destroy() {
    clearInterval(this.timerInterval);
    clearTimeout(this.enemyDelay);
    this.active = false;
    window.removeEventListener('keydown', this._keyHandler);
  }

  init() {
    this.buildUI();
    this.startTimer();
    this.scheduleEnemyAction();
    this.resizeCanvas();
    window.addEventListener('resize', ()=>this.resizeCanvas());
    this._keyHandler = (e) => this.handleKey(e.key.toUpperCase());
    window.addEventListener('keydown', this._keyHandler);
    this.drawLoop();
    this.showMessage('FIGHT!', 1200);
  }

  resizeCanvas() {
    const wrap = this.canvas.parentElement;
    this.canvas.width  = wrap.clientWidth;
    this.canvas.height = wrap.clientHeight;
  }

  // ── BUILD MOVE BUTTONS ──
  buildUI() {
    document.getElementById('playerName').textContent = this.style.name;
    document.getElementById('enemyName').textContent  = this.enemyDef.name;
    document.getElementById('roundLabel').textContent = `ROUND ${this.round}`;

    const attacks  = this.style.moves.filter(m=>m.cat==='attack');
    const specials = this.style.moves.filter(m=>m.cat==='special');
    const defense  = this.style.moves.filter(m=>m.cat==='defense');
    const mobility = this.style.moves.filter(m=>m.cat==='mobility');

    this.renderMoveRow('attackRow',  attacks,  'attack');
    this.renderMoveRow('specialRow', specials, 'special');
    this.renderMoveRow('defenseRow', defense,  'defense');
    this.renderMoveRow('mobilityRow',mobility, 'mobility');

    this.buildEnergyPips();
    this.updateHUD();
  }

  renderMoveRow(rowId, moves, cat) {
    const row = document.getElementById(rowId);
    row.innerHTML='';
    moves.forEach(m => {
      const btn = document.createElement('button');
      btn.className = `move-btn ${cat}`;
      btn.id = `btn_${m.id}`;
      btn.title = `${m.desc}${m.cost?` | ${m.cost} energy`:''}`;
      btn.innerHTML = `${m.label} <small style="opacity:.6;font-size:10px">[${m.key}]</small>`;
      btn.onclick = () => this.useMove(m);
      row.appendChild(btn);
    });
  }

  buildEnergyPips() {
    const pips = document.getElementById('energyPips');
    pips.innerHTML='';
    for(let i=0;i<this.maxEnergy;i++){
      const p=document.createElement('div');
      p.className='energy-pip';
      p.id=`ep_${i}`;
      pips.appendChild(p);
    }
  }

  // ── TIMER ──
  startTimer() {
    this.roundTime = 60;
    this.timerInterval = setInterval(()=>{
      if(!this.active) return;
      this.roundTime--;
      document.getElementById('timerDisplay').textContent = this.roundTime;
      if(this.roundTime<=0) this.endRound();
    }, 1000);
  }

  endRound() {
    clearInterval(this.timerInterval);
    // judge by HP
    if(this.playerHp > this.enemyHp) this.endGame(true, 'TIME OUT — YOU WIN!');
    else if(this.enemyHp > this.playerHp) this.endGame(false, 'TIME OUT — YOU LOSE!');
    else this.endGame(false, 'DRAW!');
  }

  // ── KEYBOARD ──
  handleKey(k) {
    if(!this.active) return;
    for(const m of this.style.moves){
      if(m.key === k){ this.useMove(m); return; }
    }
  }

  // ── USE MOVE ──
  useMove(move) {
    if(!this.active) return;
    if(this.cooldowns[move.id] > 0) return;
    if(this.energy < move.cost){ this.status(`Need ${move.cost} energy!`); return; }

    this.energy -= move.cost;
    this.setCooldown(move);

    // Special logic per category
    if(move.cat==='attack' || move.cat==='special'){
      this.executeAttack(move);
    } else if(move.cat==='defense'){
      this.executeDefense(move);
    } else if(move.cat==='mobility'){
      this.executeMobility(move);
    }

    this.updateHUD();
  }

  executeAttack(move) {
    if(this.enemyStunned || !this.enemyBlinded){
      let dmg = move.dmg[0] + Math.floor(Math.random()*(move.dmg[1]-move.dmg[0]+1));
      // counter-attack bonus
      if(this.counterReady){ dmg = Math.round(dmg*1.6); this.counterReady=false; this.status('COUNTER HIT! x1.6'); }
      this.dealDamageToEnemy(dmg, move);
    }

    // Spark / gunner shot gain energy
    if(move.id==='spark'||move.id==='shot'){ this.gainEnergy(1); }
    // Lifedrain
    if(move.id==='lifedrain'){
      const dmg2=move.dmg[0]+Math.floor(Math.random()*(move.dmg[1]-move.dmg[0]+1));
      const healed=Math.round(dmg2*0.6);
      this.playerHp=Math.min(100,this.playerHp+healed);
      this.floatText(`+${healed} HEAL`, this.playerX, '#00e676', 22);
    }
    // Rapid fire — 5 hits
    if(move.id==='rapidfire'){
      let extra=4;
      const fireMore=setInterval(()=>{
        if(!this.active||extra<=0){ clearInterval(fireMore); return; }
        const d=move.dmg[0]+Math.floor(Math.random()*(move.dmg[1]/5-move.dmg[0]/5+1));
        this.dealDamageToEnemy(Math.round(d/4), move);
        extra--;
      },120);
    }

    this.triggerCombo();
    this.animatePlayer('attack', move.kb||5);
  }

  executeDefense(move) {
    if(move.id==='block'||move.id==='ironwall'){ this.blocked=true; setTimeout(()=>{this.blocked=false;},move.id==='ironwall'?2500:1500); this.floatText('BLOCKING', this.playerX,'#7bb3ff',18); }
    if(move.id==='shield'){ this.shielded=true; setTimeout(()=>{this.shielded=false;},2000); this.floatText('SHIELDED', this.playerX,'#00ffe0',18); }
    if(move.id==='counter'||move.id==='deflect'||move.id==='iai'){ this.counterReady=true; setTimeout(()=>{this.counterReady=false;},move.cd*1000); this.floatText('COUNTER READY!',this.playerX,'#ffea00',18); }
    if(move.id==='smokescreen'){ this.enemyBlinded=true; setTimeout(()=>{this.enemyBlinded=false;},3000); this.floatText('ENEMY BLINDED!',this.enemyX,'#7b2fff',18); }
    if(move.id==='absorb'){ /* handled on hit */ this.floatText('ABSORB READY',this.playerX,'#f5a623',18); }
    if(move.id==='suppfire'){
      const sd=6+Math.floor(Math.random()*4);
      this.dealDamageToEnemy(sd, move);
      this.floatText('SUPPRESSED',this.enemyX,'#26a69a',16);
    }
  }

  executeMobility(move) {
    if(move.id==='dodge'||move.id==='roll'||move.id==='blink'||move.id==='sidestep'){
      this.dodging=true;
      this.gainEnergy(move.id==='dodge'?1:0);
      setTimeout(()=>{this.dodging=false;},700);
      this.floatText('EVADE!', this.playerX,'#4caf50',18);
    }
    if(move.id==='charge'||move.id==='pounce'){
      const d=move.dmg[0]+Math.floor(Math.random()*(move.dmg[1]-move.dmg[0]+1));
      this.dealDamageToEnemy(d, move);
      this.animatePlayer('dash', move.kb);
    }
    if(move.id==='shadowstep'){
      const d=move.dmg[0]+Math.floor(Math.random()*(move.dmg[1]-move.dmg[0]+1));
      this.dealDamageToEnemy(d, move);
      this.floatText('SHADOWSTEP!', this.enemyX,'#7b2fff',20);
      this.animatePlayer('dash', 6);
    }
  }

  dealDamageToEnemy(dmg, move) {
    // enemy dodge chance
    if(Math.random()<0.05){ this.floatText('MISS', this.enemyX,'#888',16); return; }
    this.enemyHp = Math.max(0, this.enemyHp - dmg);
    this.floatText(`-${dmg}`, this.enemyX, move.cat==='special'?'#ffea00':'#ff5252', move.cat==='special'?28:22);
    this.shake = 6;
    this.effects.push({type:'hit', x:this.enemyX, y:0.5, t:0, color:move.cat==='special'?'#ffea00':'#ff5252'});
    this.status(`${move.label} — ${dmg} dmg!`);
    if(this.enemyHp<=0) this.endGame(true);
    this.updateHUD();
    // enemy stun on heavy hits
    if(move.kb>=10){ this.enemyStunned=true; setTimeout(()=>this.enemyStunned=false,800); }
  }

  // ── ENEMY AI ──
  scheduleEnemyAction() {
    if(!this.active) return;
    const delay = 1200 + Math.random()*1800 * (1-this.enemyDef.aggressiveness*0.4);
    this.enemyDelay = setTimeout(()=>{
      if(!this.active) return;
      this.enemyAttack();
      this.scheduleEnemyAction();
    }, delay);
  }

  enemyAttack() {
    if(this.enemyStunned){ return; }
    // pick random damage
    const baseDmg = 8 + Math.floor(Math.random()*14);
    const isBig = Math.random()<0.25;
    const dmg = isBig ? baseDmg+12 : baseDmg;
    const moveName = isBig ? 'HEAVY BLOW' : ['ATTACK','STRIKE','KICK','SLAM'][Math.floor(Math.random()*4)];

    // Player can dodge
    if(this.dodging){ this.floatText('DODGED!', this.playerX,'#4caf50',20); return; }
    // Blocked
    if(this.blocked){ const b=Math.round(dmg*0.4); this.takeDamage(b, moveName, true); return; }
    // Shielded
    if(this.shielded){ this.floatText('BLOCKED!', this.playerX,'#00ffe0',20); this.shielded=false; return; }
    // Absorb
    if(this.style.id==='wrestler' && this.blocked){ this.gainEnergy(2); this.floatText('ABSORBED +2⚡',this.playerX,'#f5a623',18); return; }
    // Blinded miss
    if(this.enemyBlinded && Math.random()<0.6){ this.floatText('ENEMY MISSED!',this.enemyX,'#888',16); return; }
    // Counter triggered
    if(this.counterReady){ const cd=Math.round(dmg*0.5); this.takeDamage(cd,moveName,false); const cr=12+Math.floor(Math.random()*10); this.dealDamageToEnemy(cr,{cat:'special',kb:6}); this.floatText('COUNTER!',this.playerX,'#ffea00',22); this.counterReady=false; return; }

    this.takeDamage(dmg, moveName, false);
    this.animateEnemy('attack');
  }

  takeDamage(dmg, moveName, wasBlocked) {
    this.playerHp = Math.max(0, this.playerHp - dmg);
    this.floatText(`-${dmg}${wasBlocked?' (BLOCKED)':''}`, this.playerX,'#ff5252',20);
    this.shake = wasBlocked?3:8;
    this.effects.push({type:'hit', x:this.playerX, y:0.5, t:0, color:'#ff5252'});
    this.status(`${this.enemyDef.name}: ${moveName} — ${dmg} dmg${wasBlocked?' (blocked)':''}`);
    // Energy regen on hit
    if(Math.random()<0.3) this.gainEnergy(1);
    if(this.playerHp<=0) this.endGame(false);
    this.updateHUD();
  }

  // ── COMBO ──
  triggerCombo() {
    this.combo++;
    clearTimeout(this.comboTimer);
    this.comboTimer = setTimeout(()=>{ this.combo=0; this.updateHUD(); }, 2500);
    if(this.combo>1) this.floatText(`${this.combo}x COMBO!`, this.playerX,'#ffea00', 14+this.combo*2);
    if(this.combo>=3) this.gainEnergy(1);
  }

  gainEnergy(n) {
    this.energy = Math.min(this.maxEnergy, this.energy+n);
    this.updateHUD();
  }

  // ── COOLDOWNS ──
  setCooldown(move) {
    this.cooldowns[move.id] = move.cd;
    const btn = document.getElementById(`btn_${move.id}`);
    if(!btn) return;
    btn.disabled = true;
    const overlay = document.createElement('div');
    overlay.className='cd-overlay';
    overlay.id=`cd_${move.id}`;
    overlay.textContent=Math.ceil(move.cd);
    btn.appendChild(overlay);

    const interval = setInterval(()=>{
      this.cooldowns[move.id] = Math.max(0, this.cooldowns[move.id]-0.1);
      const ov=document.getElementById(`cd_${move.id}`);
      if(ov) ov.textContent=Math.ceil(this.cooldowns[move.id])||'';
      if(this.cooldowns[move.id]<=0){
        clearInterval(interval);
        btn.disabled=false;
        if(ov) ov.remove();
      }
    }, 100);
  }

  // ── HUD UPDATE ──
  updateHUD() {
    const ph = Math.max(0,Math.round(this.playerHp));
    const eh = Math.max(0,Math.round(this.enemyHp));
    document.getElementById('playerHpVal').textContent=ph;
    document.getElementById('enemyHpVal').textContent=eh;
    const php=ph/100, ehp=eh/this.enemyMaxHp;
    document.getElementById('playerHpBar').style.width=(php*100)+'%';
    document.getElementById('playerHpBar').style.background=php>0.5?'var(--hp-green)':php>0.25?'var(--hp-yellow)':'var(--hp-red)';
    document.getElementById('enemyHpBar').style.width=(ehp*100)+'%';
    document.getElementById('enemyHpBar').style.background=ehp>0.5?'var(--hp-green)':ehp>0.25?'var(--hp-yellow)':'var(--hp-red)';
    document.getElementById('comboDisplay').textContent = this.combo>1?`${this.combo}x COMBO`:'—';
    for(let i=0;i<this.maxEnergy;i++){
      const p=document.getElementById(`ep_${i}`);
      if(p) p.classList.toggle('filled', i<this.energy);
    }
  }

  status(msg) { document.getElementById('statusMsg').textContent=msg; }

  // ── FLOAT TEXT ──
  floatText(text, xFrac, color, size) {
    const wrap = this.canvas.parentElement;
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = text;
    el.style.cssText=`left:${xFrac*100}%;top:${30+Math.random()*30}%;color:${color};font-size:${size||20}px;transform:translateX(-50%)`;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(), 900);
  }

  showMessage(text, dur=1500) {
    const msg = document.getElementById('arenaMessage');
    const txt = document.getElementById('arenaMessageText');
    txt.textContent = text;
    msg.style.display='flex';
    setTimeout(()=>{ msg.style.display='none'; }, dur);
  }

  // ── CANVAS ANIMATIONS ──
  animatePlayer(type, kb) {
    this.playerAnim = {type, t:0, kb};
  }
  animateEnemy(type) {
    this.enemyAnim = {type, t:0};
  }

  drawLoop() {
    if(!this.active) return;
    requestAnimationFrame(()=>this.drawLoop());
    this.draw();
  }

  draw() {
    const c = this.ctx;
    const W = this.canvas.width, H = this.canvas.height;
    if(!W||!H) return;

    // shake
    let ox=0, oy=0;
    if(this.shake>0){ ox=(Math.random()-.5)*this.shake; oy=(Math.random()-.5)*this.shake; this.shake*=0.85; if(this.shake<0.3)this.shake=0; }
    c.save();
    c.translate(ox,oy);

    // BG
    const grad=c.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0e0e1a');
    grad.addColorStop(1,'#050510');
    c.fillStyle=grad;
    c.fillRect(0,0,W,H);

    // Floor
    c.fillStyle='#15152a';
    c.fillRect(0,H*0.72,W,H*0.28);
    c.strokeStyle='#2a2a4a';
    c.lineWidth=2;
    c.beginPath(); c.moveTo(0,H*0.72); c.lineTo(W,H*0.72); c.stroke();
    // floor grid
    c.strokeStyle='rgba(60,60,100,0.15)'; c.lineWidth=1;
    for(let x=0;x<W;x+=60){ c.beginPath(); c.moveTo(x,H*0.72); c.lineTo(x+40,H); c.stroke(); }

    // Crowd silhouettes
    this.drawCrowd(c,W,H);

    // fighters
    const pX=this.playerX*W, eX=this.enemyX*W, fY=H*0.72;
    this.drawFighter(c, pX, fY, this.style.color, this.playerAnim, false, this.playerHp<=0);
    this.drawFighter(c, eX, fY, this.enemyDef.color, this.enemyAnim, true, this.enemyHp<=0);

    // advance anims
    if(this.playerAnim){ this.playerAnim.t+=0.08; if(this.playerAnim.t>=1)this.playerAnim=null; }
    if(this.enemyAnim){ this.enemyAnim.t+=0.08; if(this.enemyAnim.t>=1)this.enemyAnim=null; }

    // effects
    this.effects = this.effects.filter(ef=>{
      ef.t+=0.06;
      if(ef.type==='hit'){
        const ex=ef.x*W, ey=fY-80;
        const r=30*ef.t;
        const alpha=1-ef.t;
        c.save();
        c.globalAlpha=alpha;
        const rg=c.createRadialGradient(ex,ey,0,ex,ey,r);
        rg.addColorStop(0,ef.color);
        rg.addColorStop(1,'transparent');
        c.fillStyle=rg;
        c.beginPath(); c.arc(ex,ey,r,0,Math.PI*2); c.fill();
        c.restore();
      }
      return ef.t<1;
    });

    c.restore();
  }

  drawCrowd(c, W, H) {
    const crowdY = H*0.68;
    for(let i=0;i<40;i++){
      const x=(i/40)*W + Math.sin(Date.now()*0.001+i)*3;
      const h=20+Math.sin(i*7.3)*8;
      const col=`hsl(${220+i*3},20%,${8+Math.random()*4}%)`;
      c.fillStyle=col;
      c.beginPath();
      c.ellipse(x,crowdY,10,h,0,0,Math.PI*2);
      c.fill();
    }
  }

  drawFighter(c, x, floorY, color, anim, isEnemy, dead) {
    c.save();
    if(isEnemy) c.scale(-1,1), c.translate(-x*2,0);

    const t = anim?anim.t:0;
    const type = anim?anim.type:'idle';

    let bodyX=x, bodyY=floorY;
    let legAngle=Math.sin(Date.now()*0.003)*0.15;
    let armAngle=0.3;
    let lean=0;

    if(type==='attack'){
      const punch=Math.sin(t*Math.PI);
      bodyX+=punch*(anim.kb||5);
      armAngle=0.3+punch*1.2;
      lean=punch*0.3;
    }
    if(type==='dash'){
      bodyX+=t*30;
      lean=0.4;
    }

    if(dead){
      c.globalAlpha=0.4;
      c.translate(x, floorY);
      c.rotate(1.4);
      c.translate(-x,-floorY);
    }

    // Shadow
    c.fillStyle='rgba(0,0,0,0.35)';
    c.beginPath(); c.ellipse(bodyX, floorY+2, 28, 7, 0, 0, Math.PI*2); c.fill();

    // Legs
    const legW=7, legH=45;
    c.fillStyle=`${color}88`;
    c.save(); c.translate(bodyX-8, bodyY-legH); c.rotate(legAngle);
    c.fillRect(-legW/2,0,legW,legH); c.restore();
    c.save(); c.translate(bodyX+8, bodyY-legH); c.rotate(-legAngle);
    c.fillRect(-legW/2,0,legW,legH); c.restore();

    // Torso
    c.save(); c.translate(bodyX, bodyY-legH); c.rotate(lean);
    c.fillStyle=color;
    c.beginPath();
    c.roundRect(-14,-55,28,55, [4,4,0,0]);
    c.fill();
    // Belt
    c.fillStyle='rgba(0,0,0,0.4)';
    c.fillRect(-14,-12,28,8);
    // Head
    c.fillStyle=color;
    c.beginPath(); c.arc(0,-70,18,0,Math.PI*2); c.fill();
    // Visor / eyes
    c.fillStyle=`rgba(0,0,0,0.6)`;
    c.beginPath(); c.roundRect(-10,-76,20,10,[3]); c.fill();
    c.fillStyle='white';
    c.beginPath(); c.arc(-4,-71,3,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(4,-71,3,0,Math.PI*2); c.fill();
    // Arms
    c.fillStyle=color;
    c.save(); c.translate(-18,-45); c.rotate(-armAngle);
    c.fillRect(-6,0,10,35); c.restore();
    c.save(); c.translate(18,-45); c.rotate(armAngle);
    c.fillRect(-4,0,10,35); c.restore();
    c.restore();

    // HP glow ring
    const hpFrac = isEnemy ? this.enemyHp/this.enemyMaxHp : this.playerHp/100;
    if(hpFrac>0){
      c.save();
      c.strokeStyle=hpFrac>0.5?'rgba(0,230,118,0.4)':hpFrac>0.25?'rgba(255,234,0,0.4)':'rgba(255,23,68,0.4)';
      c.lineWidth=2;
      c.beginPath(); c.arc(bodyX, bodyY-legH-70, 22, -Math.PI/2, -Math.PI/2+hpFrac*Math.PI*2); c.stroke();
      c.restore();
    }

    c.restore();
  }

  // ── END GAME ──
  endGame(playerWon, customMsg) {
    if(!this.active) return;
    this.active = false;
    clearInterval(this.timerInterval);
    clearTimeout(this.enemyDelay);
    window.removeEventListener('keydown', this._keyHandler);

    const msg = customMsg || (playerWon ? 'KO! YOU WIN!' : 'KO! YOU LOSE!');
    this.showMessage(msg, 2000);

    setTimeout(()=>{
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById('resultScreen').classList.add('active');
      const t = document.getElementById('resultTitle');
      const s = document.getElementById('resultStats');
      if(playerWon){
        t.textContent='VICTORY'; t.className='result-title win';
        s.innerHTML=`You defeated <span>${this.enemyDef.name}</span> as the <span>${this.style.name}</span><br>Enemy HP remaining: <span>${Math.round(this.enemyHp)}</span> | Your HP: <span>${Math.round(this.playerHp)}</span>`;
      } else {
        t.textContent='DEFEATED'; t.className='result-title lose';
        s.innerHTML=`<span>${this.enemyDef.name}</span> defeated you<br>Your HP: <span>${Math.round(this.playerHp)}</span> | Enemy HP: <span>${Math.round(this.enemyHp)}</span>`;
      }
    }, 2200);
  }
}
</script>
</body>
</html>
